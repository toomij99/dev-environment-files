set -g default-terminal "screen-256color"
set -ag terminal-overrides ",screen-256color:Tc"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

bind M-c attach-session -c "#{pane_current_path}"

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

set -sg escape-time 10

# Status bar theme (Tokyo Night inspired)
set -g status-position top
set -g status-justify left
set -g status-style bg=#1a1b26,fg=#c0caf5
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26] #S #[bg=#1a1b26,fg=#7aa2f7] "
set -g status-left-length 40
set -g status-right "#[fg=#565f89] %H:%M #[bg=#7aa2f7,fg=#1a1b26] #(whoami) "
set -g status-right-length 60

set -g window-status-format "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[bg=#7aa2f7,fg=#1a1b26] #I:#W "
set -g window-status-separator ""

set -g pane-border-style fg=#3d59a1
set -g pane-active-border-style fg=#7aa2f7

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Initialize TPM (must be at bottom)
run '~/.tmux/plugins/tpm/tpm'