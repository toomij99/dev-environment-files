set -g default-terminal "screen-256color"
set -ag terminal-overrides ",screen-256color:Tc"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

bind M-c attach-session -c "#{pane_current_path}"

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

set -sg escape-time 10

# Tokyo Night theme (via tmux-tokyo-night)
set -g @plugin 'fabioluciano/tmux-tokyo-night'

# Show IP in status bar
set -g status-right '#(hostname -I 2>/dev/null | cut -d" " -f1 || ipconfig getifaddr en0 2>/dev/null) | %H:%M %d-%b-%y'
set -g status-right-length 50

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'off'

# Initialize TPM (must be at bottom)
run '~/.tmux/plugins/tpm/tpm'